<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>San Francisco Street Trees</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQ9hrDn2tYwWbM65Q7JxjFE3fB0L6tE=" crossorigin="">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f6;
      --panel: #ffffff;
      --ink: #202523;
      --muted: #66706b;
      --line: #d7ddd7;
      --accent: #216b4f;
      --accent-2: #c65135;
      --shadow: 0 10px 30px rgba(32, 37, 35, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
      height: 100vh;
      min-height: 620px;
    }

    .sidebar {
      position: relative;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
      padding: 22px;
      background: var(--panel);
      border-right: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .titlebar {
      display: grid;
      gap: 5px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
    }

    .stat strong {
      display: block;
      font-size: 19px;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .stat span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: #3f4944;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .input,
    select {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      outline: none;
    }

    .input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(33, 107, 79, 0.13);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 72px;
      gap: 10px;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      min-height: 38px;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--ink);
      background: #fff;
      cursor: pointer;
    }

    .btn.primary {
      border-color: #185d44;
      color: #fff;
      background: var(--accent);
    }

    .btn:hover {
      filter: brightness(0.98);
    }

    .legend,
    .top-list {
      display: grid;
      gap: 8px;
    }

    .legend-item,
    .top-item {
      display: grid;
      grid-template-columns: 13px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 24px;
      font-size: 12px;
      line-height: 1.25;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
    }

    .top-item button {
      overflow: hidden;
      padding: 0;
      border: 0;
      color: var(--ink);
      background: transparent;
      text-align: left;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }

    .count {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .map-wrap {
      position: relative;
      min-width: 0;
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #dfe8df;
    }

    .status {
      position: absolute;
      left: 16px;
      bottom: 22px;
      z-index: 700;
      max-width: min(420px, calc(100% - 32px));
      padding: 10px 12px;
      border: 1px solid rgba(32, 37, 35, 0.15);
      border-radius: 8px;
      color: #26302b;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 5px 18px rgba(32, 37, 35, 0.14);
      font-size: 13px;
      line-height: 1.35;
      pointer-events: none;
    }

    .status.error {
      color: #802b21;
      border-color: rgba(198, 81, 53, 0.35);
    }

    .tree-popup {
      display: grid;
      gap: 5px;
      min-width: 230px;
      font-size: 13px;
      line-height: 1.25;
    }

    .tree-popup strong {
      font-size: 14px;
      line-height: 1.2;
    }

    .tree-popup span {
      color: #53605a;
    }

    .leaflet-container {
      font: inherit;
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(520px, 1fr);
        min-height: 100vh;
        height: auto;
      }

      .sidebar {
        max-height: none;
        padding: 16px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        box-shadow: 0 8px 20px rgba(32, 37, 35, 0.1);
      }

      .stats {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 560px) {
      .stats,
      .row,
      .button-row {
        grid-template-columns: 1fr 1fr;
      }

      .stat strong {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="titlebar">
        <h1>San Francisco Street Trees</h1>
        <p class="subtitle">Street Tree List snapshot from May 21, 2026. Select a neighborhood first; tree points load only for that area.</p>
      </div>

      <section class="stats" aria-label="Tree counts">
        <div class="stat">
          <strong id="total-count">0</strong>
          <span>Loaded</span>
        </div>
        <div class="stat">
          <strong id="filtered-count">0</strong>
          <span>Filtered</span>
        </div>
        <div class="stat">
          <strong id="visible-count">0</strong>
          <span>In View</span>
        </div>
        <div class="stat">
          <strong id="species-count">0</strong>
          <span>Species</span>
        </div>
      </section>

      <section class="controls" aria-label="Map controls">
        <div class="field">
          <label for="search">Search</label>
          <input class="input" id="search" type="search" placeholder="Species, address, status, caretaker">
        </div>

        <div class="row">
          <div class="field">
            <label for="color-mode">Color</label>
            <select id="color-mode">
              <option value="status">Legal status</option>
              <option value="caretaker">Caretaker</option>
              <option value="species">Top species</option>
              <option value="dbh">Trunk diameter</option>
            </select>
          </div>

          <div class="field">
            <label for="size-mode">Size</label>
            <select id="size-mode">
              <option value="constant">Constant</option>
              <option value="dbh">Trunk diameter</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="dbh-min">Minimum DBH</label>
          <div class="range-row">
            <input id="dbh-min" type="range" min="0" max="80" value="0">
            <input class="input" id="dbh-value" type="number" min="0" max="200" value="0">
          </div>
        </div>

        <div class="button-row">
          <button class="btn primary" id="reset-view" type="button">Reset View</button>
          <button class="btn" id="clear-filters" type="button">Clear Filters</button>
        </div>
      </section>

      <section>
        <label>Legend</label>
        <div class="legend" id="legend"></div>
      </section>

      <section>
        <label id="top-list-label">Neighborhoods</label>
        <div class="top-list" id="top-species"></div>
      </section>
    </aside>

    <section class="map-wrap">
      <div id="map" aria-label="Map of San Francisco street trees"></div>
      <div class="status" id="status">Loading neighborhood map...</div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const NEIGHBORHOODS_PATH = "neighborhoods-map.geojson";
    const SUMMARY_PATH = "neighborhood-summary.json";
    const TREE_DATA_DIR = "tree-data";
    const SF_CENTER = [37.7599, -122.4396];
    const SF_BOUNDS = L.latLngBounds([37.604, -122.548], [37.833, -122.349]);
    const palette = [
      "#216b4f", "#c65135", "#2f6fb3", "#8d5a9e", "#d39b22",
      "#17898a", "#b44273", "#64733b", "#6b5b45", "#3d7dca"
    ];
    const DEG_TO_RAD = Math.PI / 180;
    const statusColors = {
      "DPW Maintained": "#216b4f",
      "Permitted Site": "#2f6fb3",
      "Undocumented": "#c65135",
      "Significant Tree": "#8d5a9e",
      "Planning Code 138.1 required": "#d39b22",
      "Section 806 (d)": "#17898a",
      "Property Tree": "#64733b",
      "Private": "#6b5b45",
      "Other": "#7d8781"
    };

    const state = {
      data: null,
      details: null,
      detailsPromise: null,
      summary: null,
      neighborhoodFeatures: [],
      selectedNeighborhood: null,
      loadToken: 0,
      count: 0,
      scale: 1000000,
      dbhScale: 10,
      topSpecies: [],
      topCaretakers: [],
      topStatuses: [],
      speciesNames: [],
      statusNames: [],
      caretakerNames: [],
      speciesParts: [],
      speciesSearch: [],
      statusSearch: [],
      caretakerSearch: [],
      speciesColors: [],
      caretakerColors: [],
      statusColors: [],
      colorCache: new Map(),
      search: "",
      colorMode: "status",
      sizeMode: "constant",
      dbhMin: 0,
      filteredCount: 0,
      visibleCount: 0
    };

    const els = {
      totalCount: document.querySelector("#total-count"),
      filteredCount: document.querySelector("#filtered-count"),
      visibleCount: document.querySelector("#visible-count"),
      speciesCount: document.querySelector("#species-count"),
      search: document.querySelector("#search"),
      colorMode: document.querySelector("#color-mode"),
      sizeMode: document.querySelector("#size-mode"),
      dbhMin: document.querySelector("#dbh-min"),
      dbhValue: document.querySelector("#dbh-value"),
      resetView: document.querySelector("#reset-view"),
      clearFilters: document.querySelector("#clear-filters"),
      legend: document.querySelector("#legend"),
      topSpecies: document.querySelector("#top-species"),
      topListLabel: document.querySelector("#top-list-label"),
      status: document.querySelector("#status")
    };

    const format = new Intl.NumberFormat("en-US");
    let layer;
    let neighborhoodLayer;
    let popup = null;

    const map = L.map("map", {
      preferCanvas: true,
      zoomControl: true,
      maxBounds: SF_BOUNDS.pad(0.25)
    }).setView(SF_CENTER, 12);

    const baseTileLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    });

    function ensureInteractiveMap() {
      if (!map.hasLayer(baseTileLayer)) {
        baseTileLayer.addTo(map);
      }
      if (!layer) {
        layer = new TreeCanvasLayer().addTo(map);
      }
    }

    function redrawTrees() {
      if (layer) layer.redraw();
    }

    class TreeCanvasLayer extends L.Layer {
      constructor() {
        super();
        this.drawVersion = 0;
      }

      onAdd(activeMap) {
        this.map = activeMap;
        this.canvas = L.DomUtil.create("canvas", "leaflet-tree-canvas");
        this.canvas.style.position = "absolute";
        this.canvas.style.zIndex = "500";
        this.canvas.style.pointerEvents = "none";
        this.canvas.style.cursor = "crosshair";
        activeMap.getPanes().overlayPane.appendChild(this.canvas);
        activeMap.on("moveend zoomend resize", this.reset, this);
        activeMap.on("zoomstart movestart", this.hidePopup, this);
        this.canvas.addEventListener("click", this.handleClick.bind(this));
        this.reset();
      }

      onRemove(activeMap) {
        activeMap.getPanes().overlayPane.removeChild(this.canvas);
        activeMap.off("moveend zoomend resize", this.reset, this);
        activeMap.off("zoomstart movestart", this.hidePopup, this);
      }

      hidePopup() {
        if (popup) {
          popup.remove();
          popup = null;
        }
      }

      reset() {
        if (!this.canvas) return;
        const size = this.map.getSize();
        const topLeft = this.map.containerPointToLayerPoint([0, 0]);
        this.topLeft = topLeft;
        const ratio = window.devicePixelRatio || 1;
        L.DomUtil.setPosition(this.canvas, topLeft);
        this.canvas.width = Math.max(1, Math.floor(size.x * ratio));
        this.canvas.height = Math.max(1, Math.floor(size.y * ratio));
        this.canvas.style.width = `${size.x}px`;
        this.canvas.style.height = `${size.y}px`;
        this.draw();
      }

      redraw() {
        window.requestAnimationFrame(() => this.draw());
      }

      draw() {
        if (!this.canvas) return;
        this.canvas.style.pointerEvents = state.data ? "auto" : "none";
        this.drawVersion += 1;
        const version = this.drawVersion;
        const ctx = this.canvas.getContext("2d");
        const ratio = window.devicePixelRatio || 1;
        const size = this.map.getSize();
        const bounds = this.map.getBounds().pad(0.02);
        const south = bounds.getSouth();
        const north = bounds.getNorth();
        const west = bounds.getWest();
        const east = bounds.getEast();
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        ctx.clearRect(0, 0, size.x, size.y);

        if (!state.data) {
          state.filteredCount = 0;
          state.visibleCount = 0;
          updateCounts();
          return;
        }

        const data = state.data;
        let filtered = 0;
        let visible = 0;
        let i = 0;
        const zoom = this.map.getZoom();
        const worldScale = 256 * 2 ** zoom;
        const pixelOrigin = this.map.getPixelOrigin();
        const topLeft = this.topLeft || L.point(0, 0);
        const baseAlpha = zoom >= 15 ? 0.78 : zoom >= 13 ? 0.62 : 0.48;
        const colors = colorArrayForMode(state.colorMode, baseAlpha);
        const chunkSize = zoom >= 15 ? 5500 : 8500;

        const drawChunk = () => {
          if (version !== this.drawVersion) return;
          const end = Math.min(state.count, i + chunkSize);

          for (; i < end; i += 1) {
            if (!passesFilters(i)) continue;
            filtered += 1;

            const lat = data.lat[i] / state.scale;
            const lng = data.lng[i] / state.scale;
            if (lat < south || lat > north || lng < west || lng > east) continue;

            const x = projectX(lng, worldScale, pixelOrigin, topLeft);
            const y = projectY(lat, worldScale, pixelOrigin, topLeft);
            ctx.beginPath();
            ctx.fillStyle = colorForIndex(i, colors);
            ctx.arc(x, y, radiusForIndex(i, zoom), 0, Math.PI * 2);
            ctx.fill();
            visible += 1;
          }

          state.filteredCount = filtered;
          state.visibleCount = visible;
          updateCounts();

          if (i < state.count) {
            window.requestAnimationFrame(drawChunk);
          }
        };

        drawChunk();
      }

      handleClick(event) {
        if (!state.data) {
          selectNeighborhoodAtEvent(event);
          return;
        }
        const bounds = this.map.getBounds().pad(0.02);
        const south = bounds.getSouth();
        const north = bounds.getNorth();
        const west = bounds.getWest();
        const east = bounds.getEast();
        const clickPoint = L.point(event.offsetX, event.offsetY);
        let nearest = -1;
        let bestDistance = Infinity;
        const maxDistance = 10;
        const data = state.data;
        const zoom = this.map.getZoom();
        const worldScale = 256 * 2 ** zoom;
        const pixelOrigin = this.map.getPixelOrigin();
        const topLeft = this.topLeft || L.point(0, 0);

        for (let i = 0; i < state.count; i += 1) {
          const lat = data.lat[i] / state.scale;
          const lng = data.lng[i] / state.scale;
          if (
            !passesFilters(i)
            || lat < south
            || lat > north
            || lng < west
            || lng > east
          ) continue;
          const x = projectX(lng, worldScale, pixelOrigin, topLeft);
          const y = projectY(lat, worldScale, pixelOrigin, topLeft);
          const distance = Math.hypot(x - clickPoint.x, y - clickPoint.y);
          if (distance < bestDistance) {
            bestDistance = distance;
            nearest = i;
          }
        }

        if (nearest < 0 || bestDistance > maxDistance) {
          selectNeighborhoodAtEvent(event);
          return;
        }
        const lat = data.lat[nearest] / state.scale;
        const lng = data.lng[nearest] / state.scale;
        popup = L.popup({ closeButton: true, autoPan: true })
          .setLatLng([lat, lng])
          .setContent(treePopupHTML(nearest))
          .openOn(this.map);
      }
    }

    async function loadNeighborhoods() {
      try {
        const [neighborhoodResponse, summaryResponse] = await Promise.all([
          fetch(NEIGHBORHOODS_PATH),
          fetch(SUMMARY_PATH)
        ]);
        if (!neighborhoodResponse.ok) throw new Error(`Could not load ${NEIGHBORHOODS_PATH}`);
        if (!summaryResponse.ok) throw new Error(`Could not load ${SUMMARY_PATH}`);

        const neighborhoods = await neighborhoodResponse.json();
        const summary = await summaryResponse.json();
        state.summary = summary;
        state.neighborhoodFeatures = neighborhoods.features || [];

        neighborhoodLayer = L.geoJSON(neighborhoods, {
          style: neighborhoodStyle,
          onEachFeature: bindNeighborhood
        }).addTo(map);

        els.totalCount.textContent = format.format(summary.assignedTreeCount || summary.treeCount || 0);
        els.filteredCount.textContent = "0";
        els.visibleCount.textContent = "0";
        els.speciesCount.textContent = format.format(summary.speciesCount || 0);
        els.status.textContent = `Loaded ${format.format(summary.neighborhoodCount || 0)} neighborhoods. Click a neighborhood to load its trees.`;
        renderNeighborhoodLegend();
        renderNeighborhoodList();
        map.fitBounds(neighborhoodLayer.getBounds(), { padding: [14, 14] });
      } catch (error) {
        els.status.classList.add("error");
        els.status.textContent = `Unable to load neighborhood map. Run python3 build-data.py, then refresh. ${error.message}`;
      }
    }

    async function selectNeighborhood(properties) {
      if (!properties || !properties.slug) return;
      const token = state.loadToken + 1;
      state.loadToken = token;
      state.selectedNeighborhood = properties;
      state.data = null;
      state.details = null;
      state.detailsPromise = null;
      state.count = 0;
      state.filteredCount = 0;
      state.visibleCount = 0;
      updateCounts();
      renderSelectedNeighborhood();
      updateNeighborhoodStyles();
      if (popup) {
        popup.remove();
        popup = null;
      }

      els.status.classList.remove("error");
      els.status.textContent = `Loading ${properties.name} trees...`;
      ensureInteractiveMap();
      redrawTrees();

      try {
        const path = `${TREE_DATA_DIR}/${properties.slug}.json`;
        const response = await fetch(path);
        if (!response.ok) throw new Error(`Could not load ${path}`);
        const payload = await response.json();
        if (token !== state.loadToken) return;

        hydrateMapData(payload);
        finishLoad();
        els.status.textContent = `${properties.name}: ${format.format(state.count)} trees loaded. Click a point for details.`;
        const bounds = boundsForNeighborhood(properties.slug);
        if (bounds) map.fitBounds(bounds, { padding: [26, 26] });
      } catch (error) {
        if (token !== state.loadToken) return;
        els.status.classList.add("error");
        els.status.textContent = `Unable to load ${properties.name} trees. Run python3 build-data.py, then refresh. ${error.message}`;
      }
    }

    function hydrateMapData(payload) {
      const speciesCounts = new Map(payload.topSpecies || []);
      const statusCounts = new Map(payload.topStatuses || []);
      const caretakerCounts = new Map(payload.topCaretakers || []);

      state.data = payload;
      state.details = { addr: payload.addr || [], id: payload.id || [] };
      state.count = payload.treeCount;
      state.scale = payload.scale || 1000000;
      state.dbhScale = payload.dbhScale || 10;
      state.speciesNames = payload.species || [];
      state.statusNames = payload.statuses || [];
      state.caretakerNames = payload.caretakers || [];
      state.speciesParts = state.speciesNames.map(splitSpecies);
      state.speciesSearch = state.speciesNames.map(value => value.toLowerCase());
      state.statusSearch = state.statusNames.map(value => value.toLowerCase());
      state.caretakerSearch = state.caretakerNames.map(value => value.toLowerCase());
      state.topSpecies = topEntries(speciesCounts, 10);
      state.topStatuses = topEntries(statusCounts, 8);
      state.topCaretakers = topEntries(caretakerCounts, 8);
      els.speciesCount.textContent = format.format(state.speciesNames.length);
    }

    function finishLoad() {
      state.statusColors = state.statusNames.map(status => statusColors[status] || statusColors.Other);
      state.speciesColors = buildIndexedColors(state.speciesNames, state.topSpecies);
      state.caretakerColors = buildIndexedColors(state.caretakerNames, state.topCaretakers);
      state.colorCache.clear();
      els.totalCount.textContent = format.format(state.count);
      els.topListLabel.textContent = "Most Common Species";
      renderTopSpecies();
      renderLegend();
      redrawTrees();
    }

    function bindNeighborhood(feature, leafletLayer) {
      const properties = feature.properties || {};
      leafletLayer.on({
        click: () => selectNeighborhood(properties),
        mouseover: () => leafletLayer.setStyle({ weight: 2.5, fillOpacity: 0.72 }),
        mouseout: () => leafletLayer.setStyle(neighborhoodStyle(feature))
      });
      leafletLayer.bindTooltip(
        `${escapeHTML(properties.name)} (${format.format(properties.treeCount || 0)} trees)`,
        { sticky: true, direction: "top" }
      );
    }

    function neighborhoodStyle(feature) {
      const properties = feature.properties || {};
      const selected = state.selectedNeighborhood && state.selectedNeighborhood.slug === properties.slug;
      return {
        color: selected ? "#8f321f" : "#466056",
        weight: selected ? 2.8 : 1,
        opacity: selected ? 0.95 : 0.7,
        fillColor: selected ? "#c65135" : neighborhoodColor(properties.treeCount || 0),
        fillOpacity: selected ? 0.72 : 0.58
      };
    }

    function neighborhoodColor(count) {
      if (count >= 8000) return "#1f6f54";
      if (count >= 6000) return "#4f9a62";
      if (count >= 4000) return "#9fbd5b";
      if (count >= 2000) return "#d5b64b";
      return "#e9e2b7";
    }

    function updateNeighborhoodStyles() {
      if (!neighborhoodLayer) return;
      neighborhoodLayer.eachLayer(item => {
        item.setStyle(neighborhoodStyle(item.feature));
      });
    }

    function boundsForNeighborhood(slug) {
      if (!neighborhoodLayer) return null;
      let bounds = null;
      neighborhoodLayer.eachLayer(item => {
        if (item.feature && item.feature.properties && item.feature.properties.slug === slug) {
          bounds = item.getBounds();
        }
      });
      return bounds;
    }

    function selectNeighborhoodAtEvent(event) {
      const latlng = map.containerPointToLatLng([event.offsetX, event.offsetY]);
      const feature = neighborhoodFeatureAtLatLng(latlng);
      if (feature) selectNeighborhood(feature.properties);
    }

    function neighborhoodFeatureAtLatLng(latlng) {
      return state.neighborhoodFeatures.find(feature => {
        const properties = feature.properties || {};
        if (state.selectedNeighborhood && properties.slug === state.selectedNeighborhood.slug) return false;
        return pointInGeometry(latlng.lat, latlng.lng, feature.geometry);
      });
    }

    function pointInGeometry(lat, lng, geometry) {
      if (!geometry) return false;
      if (geometry.type === "Polygon") return pointInPolygon(lat, lng, geometry.coordinates);
      if (geometry.type === "MultiPolygon") return geometry.coordinates.some(polygon => pointInPolygon(lat, lng, polygon));
      return false;
    }

    function pointInPolygon(lat, lng, polygon) {
      if (!polygon || !polygon.length || !pointInRing(lat, lng, polygon[0])) return false;
      return !polygon.slice(1).some(ring => pointInRing(lat, lng, ring));
    }

    function pointInRing(lat, lng, ring) {
      let inside = false;
      let j = ring.length - 1;
      for (let i = 0; i < ring.length; i += 1) {
        const xi = ring[i][0];
        const yi = ring[i][1];
        const xj = ring[j][0];
        const yj = ring[j][1];
        const intersects = (yi > lat) !== (yj > lat);
        if (intersects) {
          const xAtLat = ((xj - xi) * (lat - yi)) / (yj - yi) + xi;
          if (lng < xAtLat) inside = !inside;
        }
        j = i;
      }
      return inside;
    }

    function renderNeighborhoodLegend() {
      const items = [
        { name: "8,000+ trees", color: "#1f6f54" },
        { name: "6,000-7,999", color: "#4f9a62" },
        { name: "4,000-5,999", color: "#9fbd5b" },
        { name: "2,000-3,999", color: "#d5b64b" },
        { name: "Under 2,000", color: "#e9e2b7" }
      ];
      els.legend.innerHTML = items.map(item => `
        <div class="legend-item">
          <span class="swatch" style="background:${item.color}"></span>
          <span>${item.name}</span>
          <span></span>
        </div>
      `).join("");
    }

    function renderNeighborhoodList() {
      const neighborhoods = (state.summary && state.summary.neighborhoods ? state.summary.neighborhoods : [])
        .slice()
        .sort((a, b) => b.treeCount - a.treeCount)
        .slice(0, 10);

      els.topListLabel.textContent = "Neighborhoods";
      els.topSpecies.innerHTML = neighborhoods.map(item => `
        <div class="top-item">
          <span class="swatch" style="background:${neighborhoodColor(item.treeCount)}"></span>
          <button type="button" title="${escapeHTML(item.name)}" data-slug="${escapeHTML(item.slug)}">${escapeHTML(item.name)}</button>
          <span class="count">${format.format(item.treeCount)}</span>
        </div>
      `).join("");

      els.topSpecies.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          const neighborhood = (state.summary.neighborhoods || []).find(item => item.slug === button.dataset.slug);
          if (neighborhood) selectNeighborhood(neighborhood);
        });
      });
    }

    function renderSelectedNeighborhood() {
      els.topListLabel.textContent = "Most Common Species";
      els.topSpecies.innerHTML = "";
    }

    function splitSpecies(value) {
      const parts = value.split("::").map(part => part.trim()).filter(Boolean);
      return [parts[0] || value, parts[1] || ""];
    }

    function topEntries(mapValue, limit) {
      return [...mapValue.entries()]
        .sort((a, b) => b[1] - a[1])
        .slice(0, limit)
        .map(([name, count], index) => ({ name, count, color: palette[index % palette.length] }));
    }

    function buildIndexedColors(names, items) {
      const colorByName = new Map(items.map(({ name, color }) => [name, color]));
      return names.map(name => colorByName.get(name) || "#7d8781");
    }

    function passesFilters(index) {
      const data = state.data;
      if (state.dbhMin > 0 && data.dbh[index] / state.dbhScale < state.dbhMin) return false;
      if (state.search && !matchesSearch(index)) return false;
      return true;
    }

    function matchesSearch(index) {
      const data = state.data;
      const query = state.search;
      if (state.speciesSearch[data.sp[index]].includes(query)) return true;
      if (state.statusSearch[data.st[index]].includes(query)) return true;
      if (state.caretakerSearch[data.ca[index]].includes(query)) return true;
      if (!state.details) return false;
      return (state.details.addr[index] || "").toLowerCase().includes(query)
        || (state.details.id[index] || "").includes(query);
    }

    function colorArrayForMode(mode, alpha) {
      const key = `${mode}:${alpha}`;
      if (state.colorCache.has(key)) return state.colorCache.get(key);

      let colors;
      if (mode === "status") {
        colors = state.statusColors.map(color => hexToRGBA(color, alpha));
      } else if (mode === "caretaker") {
        colors = state.caretakerColors.map(color => hexToRGBA(color, alpha));
      } else if (mode === "species") {
        colors = state.speciesColors.map(color => hexToRGBA(color, alpha));
      } else {
        colors = [
          hexToRGBA("#216b4f", alpha),
          hexToRGBA("#2f6fb3", alpha),
          hexToRGBA("#d39b22", alpha),
          hexToRGBA("#c65135", alpha),
          hexToRGBA("#6b2e83", alpha)
        ];
      }

      state.colorCache.set(key, colors);
      return colors;
    }

    function colorForIndex(index, colors) {
      const data = state.data;
      if (state.colorMode === "status") return colors[data.st[index]];
      if (state.colorMode === "caretaker") return colors[data.ca[index]];
      if (state.colorMode === "species") return colors[data.sp[index]];
      return colors[dbhBucket(data.dbh[index] / state.dbhScale)];
    }

    function dbhBucket(dbh) {
      if (dbh >= 36) return 4;
      if (dbh >= 24) return 3;
      if (dbh >= 12) return 2;
      if (dbh >= 6) return 1;
      return 0;
    }

    function projectX(lng, worldScale, pixelOrigin, topLeft) {
      return ((lng + 180) / 360 * worldScale) - pixelOrigin.x - topLeft.x;
    }

    function projectY(lat, worldScale, pixelOrigin, topLeft) {
      const sin = Math.sin(lat * DEG_TO_RAD);
      return (0.5 - Math.log((1 + sin) / (1 - sin)) / (4 * Math.PI)) * worldScale - pixelOrigin.y - topLeft.y;
    }

    function hexToRGBA(hex, alpha) {
      const value = hex.replace("#", "");
      const r = parseInt(value.slice(0, 2), 16);
      const g = parseInt(value.slice(2, 4), 16);
      const b = parseInt(value.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function radiusForIndex(index, zoom) {
      const zoomBase = zoom >= 16 ? 3.9 : zoom >= 14 ? 2.7 : zoom >= 12 ? 1.8 : 1.15;
      if (state.sizeMode !== "dbh") return zoomBase;
      return Math.min(7, zoomBase + Math.sqrt(Math.max(0, state.data.dbh[index] / state.dbhScale)) * 0.34);
    }

    function dbhLabel(index) {
      const dbh = state.data.dbh[index] / state.dbhScale;
      return dbh ? `${escapeHTML(String(dbh))} in` : "Unknown";
    }

    function treePopupHTML(index) {
      const speciesIndex = state.data.sp[index];
      const status = state.statusNames[state.data.st[index]] || "Unknown";
      const caretaker = state.caretakerNames[state.data.ca[index]] || "Unknown";
      const [scientific, common] = state.speciesParts[speciesIndex] || ["Unknown", ""];
      const address = state.details ? state.details.addr[index] || "No address" : "Loading address...";

      return `
        <div class="tree-popup">
          <strong>${escapeHTML(common || state.speciesNames[speciesIndex] || "Unknown tree")}</strong>
          <span>${escapeHTML(scientific || "Unknown scientific name")}</span>
          <div>${escapeHTML(address)}</div>
          <div>Status: ${escapeHTML(status)}</div>
          <div>Caretaker: ${escapeHTML(caretaker)}</div>
          <div>DBH: ${dbhLabel(index)}</div>
        </div>
      `;
    }

    async function loadDetails() {
      return state.details;
    }

    function renderLegend() {
      let items = [];
      if (state.colorMode === "status") {
        items = Object.entries(statusColors).map(([name, color]) => ({ name, color }));
      } else if (state.colorMode === "caretaker") {
        items = state.topCaretakers.map(({ name, color }) => ({ name, color })).concat([{ name: "Other", color: "#7d8781" }]);
      } else if (state.colorMode === "species") {
        items = state.topSpecies.slice(0, 8).map(({ name, color }) => ({ name: commonName(name), color })).concat([{ name: "Other species", color: "#7d8781" }]);
      } else {
        items = [
          { name: "0-5 in", color: "#216b4f" },
          { name: "6-11 in", color: "#2f6fb3" },
          { name: "12-23 in", color: "#d39b22" },
          { name: "24-35 in", color: "#c65135" },
          { name: "36+ in", color: "#6b2e83" }
        ];
      }

      els.legend.innerHTML = items.map(item => `
        <div class="legend-item">
          <span class="swatch" style="background:${item.color}"></span>
          <span title="${escapeHTML(item.name)}">${escapeHTML(item.name)}</span>
          <span></span>
        </div>
      `).join("");
    }

    function renderTopSpecies() {
      els.topSpecies.innerHTML = state.topSpecies.map((item, index) => `
        <div class="top-item">
          <span class="swatch" style="background:${palette[index % palette.length]}"></span>
          <button type="button" title="${escapeHTML(item.name)}" data-species="${escapeHTML(item.name)}">${escapeHTML(commonName(item.name))}</button>
          <span class="count">${format.format(item.count)}</span>
        </div>
      `).join("");

      els.topSpecies.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          els.search.value = button.dataset.species;
          state.search = button.dataset.species.toLowerCase();
          redrawTrees();
        });
      });
    }

    function commonName(species) {
      return splitSpecies(species)[1] || splitSpecies(species)[0] || "Unknown";
    }

    function updateCounts() {
      els.filteredCount.textContent = format.format(state.filteredCount);
      els.visibleCount.textContent = format.format(state.visibleCount);
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function debounce(fn, wait) {
      let timeout;
      return (...args) => {
        window.clearTimeout(timeout);
        timeout = window.setTimeout(() => fn(...args), wait);
      };
    }

    const redrawDebounced = debounce(redrawTrees, 80);

    els.search.addEventListener("input", () => {
      state.search = els.search.value.trim().toLowerCase();
      redrawDebounced();
    });

    els.colorMode.addEventListener("change", () => {
      state.colorMode = els.colorMode.value;
      if (state.data) {
        renderLegend();
      } else {
        renderNeighborhoodLegend();
      }
      redrawTrees();
    });

    els.sizeMode.addEventListener("change", () => {
      state.sizeMode = els.sizeMode.value;
      redrawTrees();
    });

    els.dbhMin.addEventListener("input", () => {
      state.dbhMin = Number(els.dbhMin.value) || 0;
      els.dbhValue.value = state.dbhMin;
      redrawDebounced();
    });

    els.dbhValue.addEventListener("input", () => {
      state.dbhMin = Math.max(0, Number(els.dbhValue.value) || 0);
      els.dbhMin.value = Math.min(80, state.dbhMin);
      redrawDebounced();
    });

    els.resetView.addEventListener("click", () => {
      if (state.selectedNeighborhood) {
        const bounds = boundsForNeighborhood(state.selectedNeighborhood.slug);
        if (bounds) {
          map.fitBounds(bounds, { padding: [26, 26] });
          return;
        }
      }
      if (neighborhoodLayer) {
        map.fitBounds(neighborhoodLayer.getBounds(), { padding: [14, 14] });
      } else {
        map.fitBounds(SF_BOUNDS);
      }
    });

    els.clearFilters.addEventListener("click", () => {
      els.search.value = "";
      els.dbhMin.value = "0";
      els.dbhValue.value = "0";
      state.search = "";
      state.dbhMin = 0;
      redrawTrees();
    });

    map.fitBounds(SF_BOUNDS);
    loadNeighborhoods();
  </script>
</body>
</html>
