<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>San Francisco Street Trees</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQ9hrDn2tYwWbM65Q7JxjFE3fB0L6tE=" crossorigin="">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f6;
      --panel: #ffffff;
      --ink: #202523;
      --muted: #66706b;
      --line: #d7ddd7;
      --accent: #216b4f;
      --accent-2: #c65135;
      --shadow: 0 10px 30px rgba(32, 37, 35, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
      height: 100vh;
      min-height: 620px;
    }

    .sidebar {
      position: relative;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
      padding: 22px;
      background: var(--panel);
      border-right: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .titlebar {
      display: grid;
      gap: 5px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
    }

    .stat strong {
      display: block;
      font-size: 19px;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .stat span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: #3f4944;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .input,
    select {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      outline: none;
    }

    .input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(33, 107, 79, 0.13);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 72px;
      gap: 10px;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      min-height: 38px;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--ink);
      background: #fff;
      cursor: pointer;
    }

    .btn.primary {
      border-color: #185d44;
      color: #fff;
      background: var(--accent);
    }

    .btn:hover {
      filter: brightness(0.98);
    }

    .legend,
    .top-list {
      display: grid;
      gap: 8px;
    }

    .legend-item,
    .top-item {
      display: grid;
      grid-template-columns: 13px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 24px;
      font-size: 12px;
      line-height: 1.25;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
    }

    .top-item button {
      overflow: hidden;
      padding: 0;
      border: 0;
      color: var(--ink);
      background: transparent;
      text-align: left;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }

    .count {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .map-wrap {
      position: relative;
      min-width: 0;
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #dfe8df;
    }

    .status {
      position: absolute;
      left: 16px;
      bottom: 22px;
      z-index: 700;
      max-width: min(420px, calc(100% - 32px));
      padding: 10px 12px;
      border: 1px solid rgba(32, 37, 35, 0.15);
      border-radius: 8px;
      color: #26302b;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 5px 18px rgba(32, 37, 35, 0.14);
      font-size: 13px;
      line-height: 1.35;
      pointer-events: none;
    }

    .status.error {
      color: #802b21;
      border-color: rgba(198, 81, 53, 0.35);
    }

    .tree-popup {
      display: grid;
      gap: 5px;
      min-width: 230px;
      font-size: 13px;
      line-height: 1.25;
    }

    .tree-popup strong {
      font-size: 14px;
      line-height: 1.2;
    }

    .tree-popup span {
      color: #53605a;
    }

    .leaflet-container {
      font: inherit;
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(520px, 1fr);
        min-height: 100vh;
        height: auto;
      }

      .sidebar {
        max-height: none;
        padding: 16px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        box-shadow: 0 8px 20px rgba(32, 37, 35, 0.1);
      }

      .stats {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 560px) {
      .stats,
      .row,
      .button-row {
        grid-template-columns: 1fr 1fr;
      }

      .stat strong {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="titlebar">
        <h1>San Francisco Street Trees</h1>
        <p class="subtitle">Street Tree List snapshot from May 21, 2026. Points are drawn on canvas so every geocoded tree can stay on the map.</p>
      </div>

      <section class="stats" aria-label="Tree counts">
        <div class="stat">
          <strong id="total-count">0</strong>
          <span>Loaded</span>
        </div>
        <div class="stat">
          <strong id="filtered-count">0</strong>
          <span>Filtered</span>
        </div>
        <div class="stat">
          <strong id="visible-count">0</strong>
          <span>In View</span>
        </div>
        <div class="stat">
          <strong id="species-count">0</strong>
          <span>Species</span>
        </div>
      </section>

      <section class="controls" aria-label="Map controls">
        <div class="field">
          <label for="search">Search</label>
          <input class="input" id="search" type="search" placeholder="Species, address, status, caretaker">
        </div>

        <div class="row">
          <div class="field">
            <label for="color-mode">Color</label>
            <select id="color-mode">
              <option value="status">Legal status</option>
              <option value="caretaker">Caretaker</option>
              <option value="species">Top species</option>
              <option value="dbh">Trunk diameter</option>
            </select>
          </div>

          <div class="field">
            <label for="size-mode">Size</label>
            <select id="size-mode">
              <option value="constant">Constant</option>
              <option value="dbh">Trunk diameter</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="dbh-min">Minimum DBH</label>
          <div class="range-row">
            <input id="dbh-min" type="range" min="0" max="80" value="0">
            <input class="input" id="dbh-value" type="number" min="0" max="200" value="0">
          </div>
        </div>

        <div class="button-row">
          <button class="btn primary" id="reset-view" type="button">Reset View</button>
          <button class="btn" id="clear-filters" type="button">Clear Filters</button>
        </div>
      </section>

      <section>
        <label>Legend</label>
        <div class="legend" id="legend"></div>
      </section>

      <section>
        <label>Most Common Species</label>
        <div class="top-list" id="top-species"></div>
      </section>
    </aside>

    <section class="map-wrap">
      <div id="map" aria-label="Map of San Francisco street trees"></div>
      <div class="status" id="status">Loading tree data...</div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const CSV_PATH = "Street_Tree_List_20260521.csv";
    const SF_CENTER = [37.7599, -122.4396];
    const SF_BOUNDS = L.latLngBounds([37.604, -122.548], [37.833, -122.349]);
    const palette = [
      "#216b4f", "#c65135", "#2f6fb3", "#8d5a9e", "#d39b22",
      "#17898a", "#b44273", "#64733b", "#6b5b45", "#3d7dca"
    ];
    const statusColors = {
      "DPW Maintained": "#216b4f",
      "Permitted Site": "#2f6fb3",
      "Undocumented": "#c65135",
      "Significant Tree": "#8d5a9e",
      "Planning Code 138.1 required": "#d39b22",
      "Section 806 (d)": "#17898a",
      "Property Tree": "#64733b",
      "Private": "#6b5b45",
      "Other": "#7d8781"
    };

    const state = {
      trees: [],
      topSpecies: [],
      topCaretakers: [],
      topStatuses: [],
      search: "",
      colorMode: "status",
      sizeMode: "constant",
      dbhMin: 0,
      filteredCount: 0,
      visibleCount: 0
    };

    const els = {
      totalCount: document.querySelector("#total-count"),
      filteredCount: document.querySelector("#filtered-count"),
      visibleCount: document.querySelector("#visible-count"),
      speciesCount: document.querySelector("#species-count"),
      search: document.querySelector("#search"),
      colorMode: document.querySelector("#color-mode"),
      sizeMode: document.querySelector("#size-mode"),
      dbhMin: document.querySelector("#dbh-min"),
      dbhValue: document.querySelector("#dbh-value"),
      resetView: document.querySelector("#reset-view"),
      clearFilters: document.querySelector("#clear-filters"),
      legend: document.querySelector("#legend"),
      topSpecies: document.querySelector("#top-species"),
      status: document.querySelector("#status")
    };

    const format = new Intl.NumberFormat("en-US");
    let layer;
    let popup = null;

    const map = L.map("map", {
      preferCanvas: true,
      zoomControl: true,
      maxBounds: SF_BOUNDS.pad(0.25)
    }).setView(SF_CENTER, 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    class TreeCanvasLayer extends L.Layer {
      onAdd(activeMap) {
        this.map = activeMap;
        this.canvas = L.DomUtil.create("canvas", "leaflet-tree-canvas");
        this.canvas.style.position = "absolute";
        this.canvas.style.pointerEvents = "auto";
        this.canvas.style.cursor = "crosshair";
        activeMap.getPanes().overlayPane.appendChild(this.canvas);
        activeMap.on("moveend zoomend resize", this.reset, this);
        activeMap.on("zoomstart movestart", this.hidePopup, this);
        this.canvas.addEventListener("click", this.handleClick.bind(this));
        this.reset();
      }

      onRemove(activeMap) {
        activeMap.getPanes().overlayPane.removeChild(this.canvas);
        activeMap.off("moveend zoomend resize", this.reset, this);
        activeMap.off("zoomstart movestart", this.hidePopup, this);
      }

      hidePopup() {
        if (popup) {
          popup.remove();
          popup = null;
        }
      }

      reset() {
        if (!this.canvas) return;
        const size = this.map.getSize();
        const topLeft = this.map.containerPointToLayerPoint([0, 0]);
        const ratio = window.devicePixelRatio || 1;
        L.DomUtil.setPosition(this.canvas, topLeft);
        this.canvas.width = Math.max(1, Math.floor(size.x * ratio));
        this.canvas.height = Math.max(1, Math.floor(size.y * ratio));
        this.canvas.style.width = `${size.x}px`;
        this.canvas.style.height = `${size.y}px`;
        this.draw();
      }

      redraw() {
        window.requestAnimationFrame(() => this.draw());
      }

      draw() {
        if (!this.canvas) return;
        const ctx = this.canvas.getContext("2d");
        const ratio = window.devicePixelRatio || 1;
        const size = this.map.getSize();
        const bounds = this.map.getBounds().pad(0.02);
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        ctx.clearRect(0, 0, size.x, size.y);

        let filtered = 0;
        let visible = 0;
        const zoom = this.map.getZoom();
        const baseAlpha = zoom >= 15 ? 0.78 : zoom >= 13 ? 0.62 : 0.48;

        for (const tree of state.trees) {
          if (!passesFilters(tree)) continue;
          filtered += 1;
          if (!bounds.contains(tree.latLng)) continue;

          const point = this.map.latLngToContainerPoint(tree.latLng);
          const radius = getRadius(tree, zoom);
          ctx.beginPath();
          ctx.fillStyle = colorFor(tree, baseAlpha);
          ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
          ctx.fill();
          visible += 1;
        }

        state.filteredCount = filtered;
        state.visibleCount = visible;
        updateCounts();
      }

      handleClick(event) {
        if (!state.trees.length) return;
        const bounds = this.map.getBounds().pad(0.02);
        const clickPoint = L.point(event.offsetX, event.offsetY);
        let nearest = null;
        let bestDistance = Infinity;
        const maxDistance = 10;

        for (const tree of state.trees) {
          if (!passesFilters(tree) || !bounds.contains(tree.latLng)) continue;
          const point = this.map.latLngToContainerPoint(tree.latLng);
          const distance = point.distanceTo(clickPoint);
          if (distance < bestDistance) {
            bestDistance = distance;
            nearest = tree;
          }
        }

        if (!nearest || bestDistance > maxDistance) return;
        const content = `
          <div class="tree-popup">
            <strong>${escapeHTML(nearest.common || nearest.species || "Unknown tree")}</strong>
            <span>${escapeHTML(nearest.scientific || "Unknown scientific name")}</span>
            <div>${escapeHTML(nearest.address || "No address")}</div>
            <div>Status: ${escapeHTML(nearest.status || "Unknown")}</div>
            <div>Caretaker: ${escapeHTML(nearest.caretaker || "Unknown")}</div>
            <div>DBH: ${nearest.dbh ? `${escapeHTML(String(nearest.dbh))} in` : "Unknown"}</div>
          </div>
        `;
        popup = L.popup({ closeButton: true, autoPan: true })
          .setLatLng(nearest.latLng)
          .setContent(content)
          .openOn(this.map);
      }
    }

    function parseCSVLine(line) {
      const fields = [];
      let current = "";
      let quoted = false;

      for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        const next = line[i + 1];
        if (char === '"') {
          if (quoted && next === '"') {
            current += '"';
            i += 1;
          } else {
            quoted = !quoted;
          }
        } else if (char === "," && !quoted) {
          fields.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      fields.push(current);
      return fields;
    }

    async function loadTrees() {
      try {
        const response = await fetch(CSV_PATH);
        if (!response.ok) throw new Error(`Could not load ${CSV_PATH}`);
        const csv = await response.text();
        const lines = csv.split(/\r?\n/).filter(Boolean);
        const headers = parseCSVLine(lines.shift());
        const index = Object.fromEntries(headers.map((name, i) => [name, i]));
        const trees = [];
        const speciesCounts = new Map();
        const statusCounts = new Map();
        const caretakerCounts = new Map();

        for (const line of lines) {
          const row = parseCSVLine(line);
          const lat = Number(row[index.Latitude]);
          const lng = Number(row[index.Longitude]);
          if (!Number.isFinite(lat) || !Number.isFinite(lng)) continue;
          if (!SF_BOUNDS.pad(0.08).contains([lat, lng])) continue;

          const rawSpecies = clean(row[index.qSpecies]) || "Unknown";
          const [scientific, common] = splitSpecies(rawSpecies);
          const status = clean(row[index.qLegalStatus]) || "Unknown";
          const caretaker = clean(row[index.qCaretaker]) || "Unknown";
          const address = clean(row[index.qAddress]);
          const dbh = parseDBH(row[index.DBH]);
          const searchText = [
            rawSpecies,
            scientific,
            common,
            status,
            caretaker,
            address
          ].join(" ").toLowerCase();

          trees.push({
            id: clean(row[index.TreeID]),
            lat,
            lng,
            latLng: L.latLng(lat, lng),
            species: rawSpecies,
            scientific,
            common,
            status,
            caretaker,
            address,
            dbh,
            searchText
          });
          increment(speciesCounts, rawSpecies);
          increment(statusCounts, status);
          increment(caretakerCounts, caretaker);
        }

        state.trees = trees;
        state.topSpecies = topEntries(speciesCounts, 10);
        state.topStatuses = topEntries(statusCounts, 8);
        state.topCaretakers = topEntries(caretakerCounts, 8);
        els.status.textContent = `Loaded ${format.format(trees.length)} geocoded trees. Click a point for details.`;
        els.totalCount.textContent = format.format(trees.length);
        els.speciesCount.textContent = format.format(speciesCounts.size);
        renderTopSpecies();
        renderLegend();
        layer.redraw();
      } catch (error) {
        els.status.classList.add("error");
        els.status.textContent = `Unable to load the CSV. Start a local web server in this folder, then open the page from that server. ${error.message}`;
      }
    }

    function splitSpecies(value) {
      const parts = value.split("::").map(part => part.trim()).filter(Boolean);
      return [parts[0] || value, parts[1] || ""];
    }

    function clean(value) {
      return (value || "").trim();
    }

    function parseDBH(value) {
      const dbh = Number(value);
      return Number.isFinite(dbh) && dbh >= 0 ? dbh : 0;
    }

    function increment(mapValue, key) {
      mapValue.set(key, (mapValue.get(key) || 0) + 1);
    }

    function topEntries(mapValue, limit) {
      return [...mapValue.entries()]
        .sort((a, b) => b[1] - a[1])
        .slice(0, limit)
        .map(([name, count], index) => ({ name, count, color: palette[index % palette.length] }));
    }

    function passesFilters(tree) {
      if (state.dbhMin > 0 && tree.dbh < state.dbhMin) return false;
      if (state.search && !tree.searchText.includes(state.search)) return false;
      return true;
    }

    function colorFor(tree, alpha = 0.6) {
      let hex = "#216b4f";
      if (state.colorMode === "status") {
        hex = statusColors[tree.status] || statusColors.Other;
      } else if (state.colorMode === "caretaker") {
        const entry = state.topCaretakers.find(item => item.name === tree.caretaker);
        hex = entry ? entry.color : "#7d8781";
      } else if (state.colorMode === "species") {
        const entry = state.topSpecies.find(item => item.name === tree.species);
        hex = entry ? entry.color : "#7d8781";
      } else if (state.colorMode === "dbh") {
        hex = dbhColor(tree.dbh);
      }
      return hexToRGBA(hex, alpha);
    }

    function dbhColor(dbh) {
      if (dbh >= 36) return "#6b2e83";
      if (dbh >= 24) return "#c65135";
      if (dbh >= 12) return "#d39b22";
      if (dbh >= 6) return "#2f6fb3";
      return "#216b4f";
    }

    function hexToRGBA(hex, alpha) {
      const value = hex.replace("#", "");
      const r = parseInt(value.slice(0, 2), 16);
      const g = parseInt(value.slice(2, 4), 16);
      const b = parseInt(value.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function getRadius(tree, zoom) {
      const zoomBase = zoom >= 16 ? 3.9 : zoom >= 14 ? 2.7 : zoom >= 12 ? 1.8 : 1.15;
      if (state.sizeMode !== "dbh") return zoomBase;
      return Math.min(7, zoomBase + Math.sqrt(Math.max(0, tree.dbh)) * 0.34);
    }

    function renderLegend() {
      let items = [];
      if (state.colorMode === "status") {
        items = Object.entries(statusColors).map(([name, color]) => ({ name, color }));
      } else if (state.colorMode === "caretaker") {
        items = state.topCaretakers.map(({ name, color }) => ({ name, color })).concat([{ name: "Other", color: "#7d8781" }]);
      } else if (state.colorMode === "species") {
        items = state.topSpecies.slice(0, 8).map(({ name, color }) => ({ name: commonName(name), color })).concat([{ name: "Other species", color: "#7d8781" }]);
      } else {
        items = [
          { name: "0-5 in", color: "#216b4f" },
          { name: "6-11 in", color: "#2f6fb3" },
          { name: "12-23 in", color: "#d39b22" },
          { name: "24-35 in", color: "#c65135" },
          { name: "36+ in", color: "#6b2e83" }
        ];
      }

      els.legend.innerHTML = items.map(item => `
        <div class="legend-item">
          <span class="swatch" style="background:${item.color}"></span>
          <span title="${escapeHTML(item.name)}">${escapeHTML(item.name)}</span>
          <span></span>
        </div>
      `).join("");
    }

    function renderTopSpecies() {
      els.topSpecies.innerHTML = state.topSpecies.map((item, index) => `
        <div class="top-item">
          <span class="swatch" style="background:${palette[index % palette.length]}"></span>
          <button type="button" title="${escapeHTML(item.name)}" data-species="${escapeHTML(item.name)}">${escapeHTML(commonName(item.name))}</button>
          <span class="count">${format.format(item.count)}</span>
        </div>
      `).join("");

      els.topSpecies.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          els.search.value = button.dataset.species;
          state.search = button.dataset.species.toLowerCase();
          layer.redraw();
        });
      });
    }

    function commonName(species) {
      return splitSpecies(species)[1] || splitSpecies(species)[0] || "Unknown";
    }

    function updateCounts() {
      els.filteredCount.textContent = format.format(state.filteredCount);
      els.visibleCount.textContent = format.format(state.visibleCount);
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function debounce(fn, wait) {
      let timeout;
      return (...args) => {
        window.clearTimeout(timeout);
        timeout = window.setTimeout(() => fn(...args), wait);
      };
    }

    const redrawDebounced = debounce(() => layer.redraw(), 80);

    els.search.addEventListener("input", () => {
      state.search = els.search.value.trim().toLowerCase();
      redrawDebounced();
    });

    els.colorMode.addEventListener("change", () => {
      state.colorMode = els.colorMode.value;
      renderLegend();
      layer.redraw();
    });

    els.sizeMode.addEventListener("change", () => {
      state.sizeMode = els.sizeMode.value;
      layer.redraw();
    });

    els.dbhMin.addEventListener("input", () => {
      state.dbhMin = Number(els.dbhMin.value) || 0;
      els.dbhValue.value = state.dbhMin;
      redrawDebounced();
    });

    els.dbhValue.addEventListener("input", () => {
      state.dbhMin = Math.max(0, Number(els.dbhValue.value) || 0);
      els.dbhMin.value = Math.min(80, state.dbhMin);
      redrawDebounced();
    });

    els.resetView.addEventListener("click", () => {
      map.fitBounds(SF_BOUNDS);
    });

    els.clearFilters.addEventListener("click", () => {
      els.search.value = "";
      els.dbhMin.value = "0";
      els.dbhValue.value = "0";
      state.search = "";
      state.dbhMin = 0;
      layer.redraw();
    });

    layer = new TreeCanvasLayer().addTo(map);
    map.fitBounds(SF_BOUNDS);
    loadTrees();
  </script>
</body>
</html>
